<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Happy Birthday Torikul</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  touch-action:none;
}

/* CENTER TEXT */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:clamp(30px,6vw,46px);
  font-weight:900;
  animation:rgb 3s infinite linear;
  z-index:10;
}

@keyframes rgb{
  0%{color:#ff0040;text-shadow:0 0 20px #ff0040;}
  25%{color:#00ffff;text-shadow:0 0 20px #00ffff;}
  50%{color:#00ff6a;text-shadow:0 0 20px #00ff6a;}
  75%{color:#ffd000;text-shadow:0 0 20px #ffd000;}
  100%{color:#ff00ff;text-shadow:0 0 20px #ff00ff;}
}

/* ⬇️ FIXED FALLING TEXT (CLEAR RGB COLORS) */
.fall{
  position:absolute;
  top:-80px;
  font-size:20px;
  font-weight:800;
  white-space:nowrap;
  animation:drop linear forwards;
  will-change:transform;
  opacity:1;
  text-shadow:0 0 10px #fff;
}

/* smooth drop */
@keyframes drop{
  from{transform:translate3d(0,-100px,0);}
  to{transform:translate3d(0,110vh,0);}
}

/* touch effect */
.trail{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  box-shadow:0 0 10px red,0 0 20px blue,0 0 30px lime;
  animation:fade .8s forwards;
}

@keyframes fade{
  to{transform:scale(2.5);opacity:0;}
}
</style>
</head>

<body>

<div class="center">
Happy Birthday<br>Torikul
</div>

<script>
/* 🌈 RGB COLOR ARRAY */
const colors=[
  "#ff0040","#00ffff","#00ff6a","#ffd000",
  "#ff00ff","#ff3300","#33ccff","#66ff33"
];

/* ⬇️ SMOOTH RAIN WITH CLEAR COLORS */
function spawn(){
  const el=document.createElement("div");
  el.className="fall";
  el.textContent="Happy Birthday Torikul ✨";

  el.style.left=Math.random()*window.innerWidth+"px";

  /* RANDOM RGB COLOR */
  el.style.color=colors[Math.floor(Math.random()*colors.length)];

  /* smooth speed */
  el.style.animationDuration=(5 + Math.random()*4)+"s";

  document.body.appendChild(el);

  setTimeout(()=>el.remove(),10000);
}

setInterval(spawn,250);

/* touch trail */
document.addEventListener("touchmove",e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.touches[0].pageX+"px";
  t.style.top=e.touches[0].pageY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),800);
},{passive:true});
</script>

</body>
</html>
