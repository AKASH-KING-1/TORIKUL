<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Torikul</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family: Arial, sans-serif;
}

/* Center text */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:clamp(28px,6vw,44px);
  font-weight:700;
  animation:rgb 3s infinite linear;
  z-index:10;
}

@keyframes rgb{
  0%{color:#ff0040;text-shadow:0 0 15px #ff0040;}
  25%{color:#00ffff;text-shadow:0 0 15px #00ffff;}
  50%{color:#00ff6a;text-shadow:0 0 15px #00ff6a;}
  75%{color:#ffd000;text-shadow:0 0 15px #ffd000;}
  100%{color:#ff00ff;text-shadow:0 0 15px #ff00ff;}
}

/* Falling text */
.fall{
  position:absolute;
  top:-50px;
  font-size:14px;
  white-space:nowrap;
  animation:drop linear forwards;
  will-change: transform;
  opacity:0.9;
  color:white;
  text-shadow:0 0 10px cyan;
}

@keyframes drop{
  from{transform:translateY(-60px);}
  to{transform:translateY(110vh);}
}

/* Neon touch trail */
.trail{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  box-shadow:0 0 10px red,0 0 20px cyan,0 0 30px lime;
  animation:fade .8s forwards;
}

@keyframes fade{
  to{transform:scale(2.5);opacity:0;}
}

/* hidden fallback */
#btn{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
  box-shadow:0 0 12px cyan;
  display:none;
}
</style>
</head>

<body>

<div class="center">
Happy Birthday <br> Torikul
</div>

<button id="btn">Play Music</button>

<audio id="music" loop playsinline>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const music=document.getElementById("music");
const btn=document.getElementById("btn");

/* autoplay attempt */
window.addEventListener("load", async ()=>{
  try{
    await music.play();
  }catch(e){
    btn.style.display="block";
  }
});

btn.onclick=async ()=>{
  await music.play();
  btn.style.display="none";
};

/* falling text (optimized) */
function spawn(){
  const el=document.createElement("div");
  el.className="fall";
  el.textContent="Happy Birthday Torikul";
  el.style.left=Math.random()*window.innerWidth+"px";
  el.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(el);

  setTimeout(()=>el.remove(),8000);
}
setInterval(spawn,250);

/* touch effect */
document.addEventListener("touchmove",e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.touches[0].pageX+"px";
  t.style.top=e.touches[0].pageY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),800);
},{passive:true});

document.addEventListener("mousemove",e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.pageX+"px";
  t.style.top=e.pageY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),800);
});
</script>

</body>
</html>
