<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Happy Birthday Torikul</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;

  /* 🔒 HARD LOCK (NO ZOOM / APP FEEL) */
  touch-action:none;
  overscroll-behavior:none;
  position:fixed;
  width:100%;
  height:100%;
}

/* 🌈 CENTER TITLE RGB ANIMATION */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:clamp(30px,6vw,48px);
  font-weight:900;
  z-index:10;
  animation:rgb 3s infinite linear;
}

@keyframes rgb{
  0%{color:#ff0040;text-shadow:0 0 20px #ff0040;}
  20%{color:#00ffff;text-shadow:0 0 20px #00ffff;}
  40%{color:#00ff6a;text-shadow:0 0 20px #00ff6a;}
  60%{color:#ffd000;text-shadow:0 0 20px #ffd000;}
  80%{color:#ff00ff;text-shadow:0 0 20px #ff00ff;}
  100%{color:#ff0040;text-shadow:0 0 20px #ff0040;}
}

/* ⬇️ SMOOTH RGB FALLING TEXT */
.fall{
  position:absolute;
  top:-80px;
  font-size:18px;
  font-weight:700;
  white-space:nowrap;
  animation:drop linear forwards;
  will-change:transform;
  opacity:0.95;
  animation-timing-function: linear;
  text-shadow:0 0 12px cyan;
}

@keyframes drop{
  from{transform:translate3d(0,-100px,0);}
  to{transform:translate3d(0,110vh,0);}
}

/* ✨ TOUCH NEON EFFECT */
.trail{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  box-shadow:0 0 10px red,0 0 20px cyan,0 0 30px lime;
  animation:fade .8s forwards;
}

@keyframes fade{
  to{transform:scale(2.5);opacity:0;}
}

/* 🎵 MUSIC BUTTON (if autoplay blocked) */
#btn{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
  box-shadow:0 0 12px cyan;
  display:none;
  z-index:20;
}
</style>
</head>

<body>

<div class="center">
Happy Birthday<br>Torikul
</div>

<button id="btn">Play Music</button>

<audio id="music" loop playsinline>
  <!-- 🎵 PUT YOUR REAL HAPPY BIRTHDAY MP3 HERE -->
  <source src="music/happy-birthday.mp3" type="audio/mpeg">
</audio>

<script>
const music=document.getElementById("music");
const btn=document.getElementById("btn");

/* 🎵 autoplay attempt */
window.addEventListener("load", async ()=>{
  try{
    await music.play();
  }catch(e){
    btn.style.display="block";
  }
});

/* manual play */
btn.onclick=async ()=>{
  await music.play();
  btn.style.display="none";
};

/* ⬇️ smooth falling RGB text */
function spawn(){
  const el=document.createElement("div");
  el.className="fall";
  el.textContent="Happy Birthday Torikul ✨";

  el.style.left=Math.random()*window.innerWidth+"px";
  el.style.animationDuration=(6 + Math.random()*4)+"s";

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),10000);
}
setInterval(spawn,300);

/* ✨ touch effect */
document.addEventListener("touchmove",e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.touches[0].pageX+"px";
  t.style.top=e.touches[0].pageY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),800);
},{passive:true});

/* 🔒 HARD ZOOM BLOCK */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
</script>

</body>
</html>
