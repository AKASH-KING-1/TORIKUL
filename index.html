<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Torikul</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    font-family: Arial, sans-serif;
    height:100vh;
}

/* Main Center Text */
.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:55px;
    font-weight:bold;
    text-align:center;
    animation: rgbGlow 2s infinite alternate;
    z-index:100;
    text-shadow:0 0 20px red;
}

/* RGB Glow */
@keyframes rgbGlow{
    0%{
        color:red;
        text-shadow:0 0 20px red;
    }
    33%{
        color:lime;
        text-shadow:0 0 25px lime;
    }
    66%{
        color:cyan;
        text-shadow:0 0 25px cyan;
    }
    100%{
        color:magenta;
        text-shadow:0 0 25px magenta;
    }
}

/* Falling text */
.fall{
    position:absolute;
    color:white;
    font-size:18px;
    animation: fall linear infinite;
    white-space: nowrap;
    opacity:0.7;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
    }
    100%{
        transform:translateY(110vh);
    }
}

/* touch trail */
.trail{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background: white;
    pointer-events:none;
    animation: fadeOut 1s forwards;
    box-shadow:
        0 0 10px red,
        0 0 20px blue,
        0 0 30px lime;
}

@keyframes fadeOut{
    to{
        transform:scale(3);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="center-text">
🎉 Happy Birthday <br> Torikul 🎂
</div>

<!-- Music -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
/* falling text */
function createFallingText(){
    let text=document.createElement("div");
    text.className="fall";
    text.innerText="Happy Birthday Torikul 🎉";
    text.style.left=Math.random()*window.innerWidth+"px";
    text.style.animationDuration=(Math.random()*4+4)+"s";
    text.style.fontSize=(Math.random()*15+15)+"px";
    document.body.appendChild(text);

    setTimeout(()=>{
        text.remove();
    },8000);
}
setInterval(createFallingText,200);


/* touch / mouse trail */
document.addEventListener("mousemove",makeTrail);
document.addEventListener("touchmove",(e)=>{
   makeTrail(e.touches[0]);
});

function makeTrail(e){
    let t=document.createElement("div");
    t.className="trail";
    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";
    document.body.appendChild(t);

    setTimeout(()=>{
        t.remove();
    },1000);
}
</script>

</body>
</html>
